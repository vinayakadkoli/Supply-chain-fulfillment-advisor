[pytest]
# Test discovery: prebuilt_tests is always present; tests/ is the agent-owned
# directory for unit and integration tests â pytest silently skips if missing.
testpaths = prebuilt_tests tests

# Default options applied on every pytest run:
#   -v            verbose output (show each test name)
#   --tb=line     compact tracebacks
#   --no-header   suppress the default pytest header (custom one is in conftest)
#   --timeout     abort hanging tests after 10 minutes
#   --cov         measure coverage of the agent source (app/ package)
#   --cov-report  print missing lines to the terminal and write coverage.json
# IBD_TESTING=1 signals agent code to use mock tools instead of real MCP servers.
# This env var is checked via os.environ.get("IBD_TESTING") in the dual-mode
# MCP pattern (see guidelines-agent.md).
addopts =
    -v
    --no-header
    --timeout=600
    -s
    --cov=app
    --cov-config=.coveragerc
    --cov-report=term-missing
    --cov-report=json:coverage.json

# Silence "unknown marker" warnings â markers are also registered in conftest.py
# so they work even if pytest.ini is not loaded first.
# These markers must only be used by tests inside the prebuilt_tests/ module.
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

markers =
    structure: Tests for file and module structure
    server: Tests for server startup and A2A endpoints
    integration: End-to-end tests that invoke the agent with a real LLM
